<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Corra Studio - Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Container utama */
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .brand {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, #4ac3d3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(74,195,211,0.2);
            border-top-color: #4ac3d3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .loading-progress {
            font-size: 14px;
            opacity: 0.7;
            font-family: monospace;
        }
        .progress-bar-container {
            width: 280px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #4ac3d3;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* Carousel Container */
        .carousel-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            padding: 40px 0;
        }
        .carousel-track {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 20px 40px;
            scroll-behavior: smooth;
            cursor: grab;
            scrollbar-width: thin;
        }
        .carousel-track:active {
            cursor: grabbing;
        }
        .carousel-track::-webkit-scrollbar {
            height: 6px;
        }
        .carousel-track::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .carousel-track::-webkit-scrollbar-thumb {
            background: #4ac3d3;
            border-radius: 10px;
        }

        /* Card Item */
        .carousel-item {
            flex: 0 0 auto;
            width: 320px;
            scroll-snap-align: center;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .carousel-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .item-image {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 16px;
            background: #1a1a2e;
            cursor: pointer;
        }
        .gif-item .item-image {
            aspect-ratio: auto;
            object-fit: contain;
            background: #000;
        }
        .item-caption {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
        }
        .badge {
            background: rgba(74,195,211,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #4ac3d3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .download-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .download-btn:hover {
            background: #4ac3d3;
            color: #000;
        }

        /* Navigation Buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 10;
        }
        .nav-btn:hover {
            background: #4ac3d3;
            border-color: #4ac3d3;
        }
        .nav-btn.prev {
            left: 20px;
        }
        .nav-btn.next {
            right: 20px;
        }
        .nav-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .nav-btn:hover svg {
            fill: #000;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            opacity: 0.5;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .empty-state p {
            margin: 10px 0;
            opacity: 0.6;
        }

        /* Modal Preview */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            cursor: pointer;
        }
        .modal.show {
            display: flex;
        }
        .modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .carousel-item {
                width: 260px;
            }
            .nav-btn {
                width: 36px;
                height: 36px;
            }
            .brand {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="brand" id="brandTitle">CORRA STUDIO</div>
            <div class="sub">Your precious moments</div>
        </div>

        <!-- Loading Screen -->
        <div id="loadingScreen" class="loading-screen">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Loading gallery...</div>
            <div class="loading-progress" id="loadingProgress">0 / 0 photos</div>
            <div class="progress-bar-container">
                <div id="progressBarFill" class="progress-bar-fill"></div>
            </div>
        </div>

        <!-- Carousel Container -->
        <div class="carousel-container">
            <button class="nav-btn prev" id="prevBtn">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div id="carouselTrack" class="carousel-track">
                <!-- Items will be inserted here -->
            </div>
            <button class="nav-btn next" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>

        <div class="footer">
            © 2026 Corra Studio — Photos will be removed after 7 days
        </div>
    </div>

    <!-- Modal Preview -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img id="modalImage" src="" alt="Preview">
    </div>

    <script>
        // ==================== GALLERY LOGIC ====================
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sid');
        let brand = urlParams.get('brand') || 'CORRA STUDIO';
        const rawCount = parseInt(urlParams.get('raws')) || 0;

        // DOM Elements
        const loadingScreen = document.getElementById('loadingScreen');
        const loadingText = document.getElementById('loadingText');
        const loadingProgress = document.getElementById('loadingProgress');
        const progressBarFill = document.getElementById('progressBarFill');
        const carouselTrack = document.getElementById('carouselTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const brandTitle = document.getElementById('brandTitle');
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');

        // Data storage
        let galleryItems = []; // { type, url, caption, isGif }
        let isLoading = true;

        // Update brand
        brandTitle.innerText = brand.toUpperCase();

        // Update loading progress
        function updateLoadingProgress(current, total, status = 'loading') {
            const percent = total > 0 ? (current / total) * 100 : 0;
            loadingProgress.textContent = `${current} / ${total} photos`;
            progressBarFill.style.width = `${percent}%`;
            
            if (status === 'uploading') {
                loadingText.textContent = 'Uploading photos to gallery...';
            } else if (status === 'loading') {
                loadingText.textContent = 'Loading gallery...';
            } else if (status === 'complete') {
                loadingText.textContent = 'Complete!';
                setTimeout(() => {
                    loadingScreen.classList.add('hide');
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 500);
                }, 500);
            }
        }

        // Function to check if image exists
        async function imageExists(url) {
            try {
                const res = await fetch(url, { method: 'HEAD' });
                return res.ok;
            } catch {
                return false;
            }
        }

        // Load all images with progress
        async function loadGallery() {
            if (!sessionId) {
                carouselTrack.innerHTML = `<div class="empty-state"><p>❌ Invalid gallery link</p><p>No session ID found.</p></div>`;
                updateLoadingProgress(0, 1, 'complete');
                return;
            }

            const baseUrl = `https://atrioventricularr.github.io/corra-download/sessions/${sessionId}/`;
            
            // Check which files exist
            const checkPromises = [];
            const fileChecks = [
                { type: 'framed', url: `${baseUrl}frame.png`, caption: 'Final Photo', isGif: false },
                { type: 'gif', url: `${baseUrl}gif.gif`, caption: 'Animated GIF', isGif: true }
            ];
            
            // Add raw photos
            for (let i = 1; i <= rawCount; i++) {
                fileChecks.push({
                    type: 'raw',
                    url: `${baseUrl}raw-${i}.png`,
                    caption: `Photo ${i}`,
                    isGif: false
                });
            }

            const totalFiles = fileChecks.length;
            let foundFiles = 0;
            let checked = 0;

            // Show uploading status first
            updateLoadingProgress(0, totalFiles, 'uploading');

            for (const item of fileChecks) {
                const exists = await imageExists(item.url);
                checked++;
                updateLoadingProgress(checked, totalFiles, 'uploading');
                
                if (exists) {
                    galleryItems.push(item);
                    foundFiles++;
                }
                // Small delay to show progress
                await new Promise(r => setTimeout(r, 50));
            }

            if (galleryItems.length === 0) {
                carouselTrack.innerHTML = `<div class="empty-state"><p>📭 No photos available</p><p>Please capture photos first.</p></div>`;
                updateLoadingProgress(totalFiles, totalFiles, 'complete');
                return;
            }

            // Render carousel items
            renderCarousel();
            updateLoadingProgress(totalFiles, totalFiles, 'complete');
            isLoading = false;
        }

        // Render carousel items
        function renderCarousel() {
            carouselTrack.innerHTML = '';
            
            galleryItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `carousel-item ${item.isGif ? 'gif-item' : ''}`;
                
                const img = document.createElement('img');
                img.src = item.url;
                img.className = 'item-image';
                img.loading = 'lazy';
                img.onclick = () => openModal(item.url);
                img.onerror = () => {
                    img.src = 'https://via.placeholder.com/300x400?text=Error+Loading';
                };
                
                const caption = document.createElement('div');
                caption.className = 'item-caption';
                
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.innerText = item.type === 'framed' ? 'FRAMED' : (item.type === 'gif' ? 'GIF' : 'RAW');
                
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.innerText = 'DOWNLOAD';
                downloadBtn.onclick = (e) => {
                    e.stopPropagation();
                    downloadImage(item.url, item.caption);
                };
                
                caption.appendChild(badge);
                caption.appendChild(downloadBtn);
                
                card.appendChild(img);
                card.appendChild(caption);
                carouselTrack.appendChild(card);
            });
        }

        // Download image
        function downloadImage(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename.replace(/[^a-z0-9]/gi, '_') + '.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Modal functions
        function openModal(url) {
            modalImage.src = url;
            modal.classList.add('show');
        }
        
        function closeModal() {
            modal.classList.remove('show');
            modalImage.src = '';
        }

        // Carousel navigation
        function scrollCarousel(direction) {
            const scrollAmount = carouselTrack.clientWidth * 0.8;
            const currentScroll = carouselTrack.scrollLeft;
            const targetScroll = direction === 'next' 
                ? currentScroll + scrollAmount 
                : currentScroll - scrollAmount;
            
            carouselTrack.scrollTo({
                left: targetScroll,
                behavior: 'smooth'
            });
        }

        // Event listeners
        prevBtn.onclick = () => scrollCarousel('prev');
        nextBtn.onclick = () => scrollCarousel('next');
        
        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('show')) {
                closeModal();
            }
        });

        // Start loading
        window.onload = () => {
            loadGallery();
        };
    </script>
</body>
</html>
