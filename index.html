<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Corra Studio · Galeri Fotoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Segoe UI', 'Inter', system-ui, 'Poppins', sans-serif;
            color: #1e1e2f;
            padding: 2rem 1.5rem;
            line-height: 1.4;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            padding: 2rem 1.8rem 2.2rem;
        }

        /* header */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1e2a3a 0%, #2c3e50 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.2rem;
        }
        .brand p {
            color: #5a6874;
            font-size: 0.9rem;
            font-weight: 450;
        }

        /* section title */
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 1.8rem 0 1rem 0;
            color: #1e2a3a;
            border-left: 4px solid #1e2a3a;
            padding-left: 12px;
        }

        /* foto utama */
        .photo-card {
            background: #fafbfc;
            border-radius: 28px;
            padding: 1rem;
            margin: 1rem 0;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
            border: 1px solid #eef2f6;
        }
        .photo-frame {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            text-align: center;
        }
        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* grid untuk raw photos */
        .raw-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 1rem 0;
        }
        .raw-item {
            background: #fafbfc;
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #eef2f6;
            transition: transform 0.2s;
        }
        .raw-item:hover {
            transform: translateY(-4px);
        }
        .raw-item img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 16px;
            background: #f0f2f5;
        }
        .raw-item .btn-small {
            display: block;
            text-align: center;
            margin-top: 10px;
            background: #f0f2f5;
            color: #1e2a3a;
            padding: 8px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .raw-item .btn-small:hover {
            background: #e2e8f0;
        }

        /* gif */
        .gif-container {
            background: #fafbfc;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            border: 1px solid #eef2f6;
        }
        .gif-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 16px;
        }

        /* tombol utama */
        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 1.5rem 0 0.5rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0f2f5;
            color: #1e2a3a;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 12px 24px;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary {
            background: #1e2a3a;
            color: white;
        }
        .btn-primary:hover {
            background: #2c3e50;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #ffffff;
            border: 1px solid #dce3e9;
            color: #2c3e50;
        }
        .btn-secondary:hover {
            background: #f8fafc;
        }

        .status {
            text-align: center;
            font-size: 0.85rem;
            color: #2c7a4d;
            margin-top: 1rem;
            font-weight: 500;
        }
        .error-status {
            color: #c2410c;
        }
        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #9aaebf;
            border-top: 1px solid #edf2f7;
            padding-top: 1.2rem;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid #1e2a3a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .container { padding: 1.2rem; }
            .raw-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <h1>corra studio</h1>
        <p>your moment, beautifully framed</p>
    </div>

    <!-- FOTO UTAMA (frame) -->
    <div class="photo-card">
        <div class="photo-frame">
            <img id="mainPhoto" alt="Your photobooth result" src="" />
        </div>
    </div>

    <div class="action-group">
        <a id="downloadBtn" class="btn btn-primary" download>📸 Unduh Foto Utama</a>
        <button id="copyLinkBtn" class="btn btn-secondary">🔗 Salin tautan galeri</button>
    </div>

    <!-- RAW PHOTOS (grid) -->
    <div id="rawSection" style="display: none;">
        <div class="section-title">📷 Foto Asli (Tanpa Bingkai)</div>
        <div id="rawGrid" class="raw-grid"></div>
    </div>

    <!-- GIF -->
    <div id="gifSection" style="display: none;">
        <div class="section-title">🎬 GIF Seru</div>
        <div class="gif-container">
            <img id="gifImage" src="" alt="GIF" />
            <div style="margin-top: 12px;">
                <a id="downloadGifBtn" class="btn btn-secondary" download style="display: inline-block; padding: 8px 20px;">⬇️ Unduh GIF</a>
            </div>
        </div>
    </div>

    <div id="statusMessage" class="status">✨ Menyiapkan galeri...</div>
    <div class="footer-note">
        Setiap tautan bersifat pribadi. Hanya kamu yang bisa melihat foto ini.
    </div>
</div>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sid');

        const imgMain = document.getElementById('mainPhoto');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyBtn = document.getElementById('copyLinkBtn');
        const statusEl = document.getElementById('statusMessage');
        const rawSection = document.getElementById('rawSection');
        const rawGrid = document.getElementById('rawGrid');
        const gifSection = document.getElementById('gifSection');
        const gifImage = document.getElementById('gifImage');
        const downloadGifBtn = document.getElementById('downloadGifBtn');

        // ⚙️ KONFIGURASI SUPABASE (GANTI DENGAN MILIKMU)
        const SUPABASE_URL = 'https://glxayzdhffjtellyrelh.supabase.co';   // <-- GANTI
        const BUCKET_NAME = 'Corra-Download';

        if (!SUPABASE_URL.includes('supabase.co')) {
            statusEl.innerHTML = '⚠️ Konfigurasi belum lengkap. Hubungi operator.';
            statusEl.classList.add('error-status');
            return;
        }

        if (!sessionId) {
            statusEl.innerHTML = '❌ Tautan tidak valid — tidak ada ID sesi.';
            statusEl.classList.add('error-status');
            return;
        }

        const baseStorage = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}`;
        const basePath = `sessions/${sessionId}`;

        // Fungsi untuk mengecek apakah file ada (HEAD request)
        async function fileExists(url) {
            try {
                const res = await fetch(url, { method: 'HEAD' });
                return res.ok;
            } catch {
                return false;
            }
        }

        // Fungsi untuk memuat raw photos (coba raw-1.png, raw-2.png, ... sampai tidak ada)
        async function loadRawPhotos() {
            let index = 1;
            let hasMore = true;
            let photos = [];
            while (hasMore && index <= 20) { // maks 20 foto
                const rawUrl = `${baseStorage}/${basePath}/raw-${index}.png`;
                const exists = await fileExists(rawUrl);
                if (exists) {
                    photos.push({ url: rawUrl, number: index });
                    index++;
                } else {
                    hasMore = false;
                }
            }
            return photos;
        }

        // Render raw photos ke grid
        function renderRawPhotos(photos) {
            if (!photos.length) return false;
            rawGrid.innerHTML = '';
            for (let p of photos) {
                const col = document.createElement('div');
                col.className = 'raw-item';
                col.innerHTML = `
                    <img src="${p.url}" alt="Raw ${p.number}" loading="lazy" />
                    <a href="${p.url}" class="btn-small" download>📥 Unduh Raw ${p.number}</a>
                `;
                rawGrid.appendChild(col);
            }
            rawSection.style.display = 'block';
            return true;
        }

        // Cek dan muat GIF
        async function loadGif() {
            const gifUrl = `${baseStorage}/${basePath}/gif.gif`;
            const exists = await fileExists(gifUrl);
            if (exists) {
                gifImage.src = gifUrl;
                downloadGifBtn.href = gifUrl;
                downloadGifBtn.download = `corra_${sessionId}.gif`;
                gifSection.style.display = 'block';
                return true;
            }
            return false;
        }

        // Load foto utama (frame)
        const frameUrl = `${baseStorage}/${basePath}/frame.png`;
        let mainLoaded = false;

        const testMain = new Image();
        testMain.onload = () => {
            mainLoaded = true;
            imgMain.src = frameUrl;
            downloadBtn.href = frameUrl;
            downloadBtn.download = `corra_${sessionId}.png`;
            statusEl.innerHTML = '✅ Galeri siap! Kamu bisa unduh foto dan GIF.';
            statusEl.classList.remove('error-status');
        };
        testMain.onerror = async () => {
            statusEl.innerHTML = '⚠️ Foto utama tidak ditemukan. Pastikan sesi masih valid.';
            statusEl.classList.add('error-status');
            downloadBtn.style.display = 'none';
        };
        testMain.src = frameUrl;

        // Load raw & GIF setelah frame (tapi tidak menghalangi)
        (async () => {
            const rawPhotos = await loadRawPhotos();
            renderRawPhotos(rawPhotos);
            await loadGif();
            // Jika frame gagal, tetap tampilkan raw/gif jika ada
            if (!mainLoaded && (rawPhotos.length > 0 || document.getElementById('gifSection').style.display === 'block')) {
                statusEl.innerHTML = '📸 Foto utama tidak tersedia, tapi foto lain bisa diunduh.';
            }
        })();

        // Tombol salin tautan (dengan sessionId)
        copyBtn.addEventListener('click', async () => {
            const currentUrl = window.location.href;
            try {
                await navigator.clipboard.writeText(currentUrl);
                const original = statusEl.innerHTML;
                statusEl.innerHTML = '✅ Tautan galeri disalin! Hanya kamu yang bisa lihat foto ini.';
                setTimeout(() => { if (statusEl.innerHTML.includes('disalin')) statusEl.innerHTML = original; }, 2500);
            } catch {
                alert('Salin tautan: ' + currentUrl);
            }
        });
    })();
</script>
</body>
</html>
