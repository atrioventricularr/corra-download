<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corra Studio - Gallery</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            background: #f8f9fa;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2d3436;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            padding: 20px;
            text-align: center;
        }
        .card h2 {
            margin-top: 0;
            color: #4ac3d3;
            font-weight: 600;
        }
        .card img {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #eee;
            margin: 10px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .photo-item {
            background: #f1f2f6;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }
        .photo-item img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .btn {
            display: inline-block;
            background: #4ac3d3;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
            transition: 0.2s;
        }
        .btn:hover {
            background: #2ecc71;
            transform: translateY(-2px);
        }
        .loader {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 60px;
            color: #e74c3c;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            body { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container" id="galleryContainer">
        <div class="loader">📸 Loading your memories...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sid');
        const brand = urlParams.get('brand') || 'CORRA STUDIO';
        const rawsCount = parseInt(urlParams.get('raws')) || 0;

        if (!sessionId) {
            document.getElementById('galleryContainer').innerHTML = 
                '<div class="error">❌ Link gallery tidak valid. Tidak ada session ID.</div>';
        } else {
            const baseUrl = `https://atrioventricularr.github.io/corra-download/sessions/${sessionId}/`;
            let html = `<h1>✨ ${escapeHtml(brand)} ✨</h1>`;

            // 1. Foto dengan frame
            html += `
                <div class="card">
                    <h2>📸 FINAL PHOTO</h2>
                    <img src="${baseUrl}frame.png" alt="Frame" onerror="this.src='https://via.placeholder.com/400x300?text=No+Frame'">
                    <br>
                    <a href="${baseUrl}frame.png" class="btn" download>⬇️ DOWNLOAD</a>
                </div>`;

            // 2. GIF
            html += `
                <div class="card">
                    <h2>🎬 ANIMATED GIF</h2>
                    <img src="${baseUrl}gif.gif" alt="GIF" onerror="this.style.display='none'">
                    <br>
                    <a href="${baseUrl}gif.gif" class="btn" download>⬇️ DOWNLOAD GIF</a>
                </div>`;

            // 3. Raw photos
            if (rawsCount > 0) {
                html += `<div class="card">
                            <h2>📷 INDIVIDUAL PHOTOS</h2>
                            <div class="grid" id="rawGrid"></div>
                        </div>`;
            } else {
                html += `<div class="card"><h2>📷 INDIVIDUAL PHOTOS</h2><p>No individual photos.</p></div>`;
            }

            document.getElementById('galleryContainer').innerHTML = html;

            // Isi raw grid
            if (rawsCount > 0) {
                const rawGrid = document.getElementById('rawGrid');
                for (let i = 1; i <= rawsCount; i++) {
                    const imgSrc = `${baseUrl}raw-${i}.png`;
                    const item = document.createElement('div');
                    item.className = 'photo-item';
                    item.innerHTML = `
                        <img src="${imgSrc}" alt="Raw ${i}" onerror="this.src='https://via.placeholder.com/300x200?text=Missing'">
                        <a href="${imgSrc}" class="btn" download>⬇️ PHOTO ${i}</a>
                    `;
                    rawGrid.appendChild(item);
                }
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
